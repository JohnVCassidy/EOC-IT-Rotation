<!DOCTYPE html>
<html lang="en">
<head>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
  apiKey: "AIzaSyCqMM3ZLcJ8RLY5dq-41mIjbg4vzL6TgQ",
  authDomain: "eoc-it-rotation.firebaseapp.com",
  databaseURL: "https://eoc-it-rotation-default-rtdb.firebaseio.com",
  projectId: "eoc-it-rotation",
  storageBucket: "eoc-it-rotation.firebasestorage.app",
  messagingSenderId: "282482598596",
  appId: "1:282482598596:web:5c3e6f4e91412587ed9f91"
};

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window.rotationRef = ref(db, "rotation");
</script>
  <meta charset="UTF-8" />
  <title>EOC - IT Rotating Schedule</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      background: #ffffff;
      color: #111;
    }

    h1 {
      font-size: 22px;
      margin: 24px;
    }

    .header {
      background: #5b4fc4;
      color: white;
      padding: 20px 24px;
      margin: 0 24px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .subtitle {
      font-size: 13px;
      opacity: 0.9;
      margin-top: 6px;
    }

    .round {
      background: #463aa8;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
    }

    .controls {
      margin: 20px 24px;
    }

    button {
      padding: 8px 14px;
      font-size: 13px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 8px;
    }

    .primary { background: #5b4fc4; color: white; }
    .danger  { background: #e84c6f; color: white; }
    .link    { background: none; color: #111; text-decoration: underline; }

    .queue {
      margin: 10px 24px 24px;
      border-top: 1px solid #5b4fc4;
    }

    .queue-title {
      font-size: 12px;
      margin: 14px 0;
      font-weight: 600;
    }

    .person {
      display: flex;
      align-items: center;
      padding: 14px;
      border-bottom: 1px solid #e6e6f0;
    }

    .person.active {
      background: #f0efff;
      border: 1px solid #5b4fc4;
      border-radius: 4px;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      margin-right: 14px;
    }

    .actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
    }

    .badge {
      background: #5b4fc4;
      color: white;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
    }

    .history {
      margin: 24px;
      font-size: 13px;
    }

    input {
      padding: 8px;
      font-size: 13px;
      margin-right: 6px;
    }

    .add-row {
      margin: 14px 24px;
    }
  </style>
</head>

<body>

<h1>EOC - IT Rotating Schedule — manage turn order for a recurring task</h1>

<div class="header">
  <div>
    <div><strong>EOC - IT Rotating Schedule</strong></div>
    <div class="subtitle">The person at the top is currently up. Hit "Next turn" to rotate.</div>
  </div>
  <div class="round" id="round">Round 1</div>
</div>

<div class="controls">
  <button class="primary" onclick="nextTurn()">Next turn ↓</button>
  <button class="danger" onclick="shuffle()">Shuffle order</button>
  <button class="link" onclick="resetHistory()">Reset history</button>
</div>

<div class="queue">
  <div class="queue-title">QUEUE</div>
  <div id="list"></div>
</div>

<div class="add-row">
  <input id="newName" placeholder="Add a person..." />
  <button class="primary" onclick="addPerson()">Add</button>
</div>

<div class="history">
  <strong>TURN HISTORY</strong>
  <div id="history">No turns taken yet</div>
</div>

<script>
let round = 1;
let queue = [];
let history = [];
function saveState() {
  set(window.rotationRef, {
    queue,
    history,
    round
  });
}

import("https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js").then(({ onValue }) => {
  onValue(window.rotationRef, snapshot => {
    const data = snapshot.val();
    if (!data) return;

    queue = data.queue || [];
    history = data.history || [];
    round = data.round || 1;

    updateHistory();
    render();
  });
});

const colors = ["#cfd1ff","#aee7ce","#f6c1cf","#ffc66e","#b6d6ff","#f8c5b0"];

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  queue.forEach((name, i) => {
    const row = document.createElement("div");
    row.className = "person" + (i === 0 ? " active" : "");
    row.innerHTML = `
      <div class="avatar" style="background:${colors[i % colors.length]}">
        ${name[0]}
      </div>
      <div>${name}</div>
      <div class="actions">
        ${i === 0 ? `<span class="badge">Up now</span>` : `<span>${i+1}</span>`}
        <span onclick="moveUp(${i})">↑</span>
        <span onclick="moveDown(${i})">↓</span>
        <span onclick="remove(${i})">×</span>
      </div>
    `;
    list.appendChild(row);
  });
  document.getElementById("round").innerText = `Round ${round}`;
}

function nextTurn() {
  history.unshift(queue[0]);
  queue.push(queue.shift());
  if (queue[0] === history[0]) round++;
  updateHistory();
  render();
}

function shuffle() {
  queue.sort(() => Math.random() - 0.5);
  render();
}

function resetHistory() {
  history = [];
  round = 1;
  document.getElementById("history").innerText = "No turns taken yet";
}

function addPerson() {
  const input = document.getElementById("newName");
  if (!input.value) return;
  queue.push(input.value);
  input.value = "";
  render();
}

function remove(i) {
  queue.splice(i, 1);
  render();
}

function moveUp(i) {
  if (i === 0) return;
  [queue[i-1], queue[i]] = [queue[i], queue[i-1]];
  render();
}

function moveDown(i) {
  if (i === queue.length -1) return;
  [queue[i+1], queue[i]] = [queue[i], queue[i+1]];
  render();
}

function updateHistory() {
  document.getElementById("history").innerText =
    history.join(", ");
}

render();
</script>

</body>
</html>
