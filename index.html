<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rotating Task Schedule</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffe5d9, #ffd6e8, #eaf4ff);
  background-attachment: fixed;
  margin: 0;
  padding: 0;
  color: #2c3e50;
}

header {
  background: #bcd3ea;
  color: #2c3e50;
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

.card {
  background: #ffffff;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: #2c3e50;
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 5px rgba(0,0,0,0.12);
}

.btn-primary { background: #a7c7e7; }
.btn-success { background: #ffd6a5; }
.btn-warning { background: #ffc0cb; }
.btn-danger { background: #b8f2e6; }

input {
  padding: 10px;
  width: 70%;
  margin-right: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  color: #2c3e50;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  padding: 10px;
  background: #f3f7fb;
  margin: 5px 0;
  border-radius: 6px;
}

.current {
  background: #b5ead7;
  font-weight: bold;
}

.current-box {
  font-size: 20px;
  font-weight: bold;
  padding: 15px;
  border-radius: 10px;
  background: #f0f8ff;
  text-align: center;
}
</style>
</head>

<body>

<header>
  🔄 EOC - IT Rotating Schedule
</header>

<div class="container">

  <div class="card current-box" id="currentTurn">
    Current Turn: None
  </div>

  <div class="card">
    <button class="btn-primary" onclick="nextTurn()">⏭️ Next Turn</button>
    <button class="btn-warning" onclick="shuffle()">🔀 Shuffle</button>
    <button class="btn-danger" onclick="reset()">♻️ Reset</button>
  </div>

  <div class="card">
    <input id="nameInput" placeholder="Add a person..." />
    <button class="btn-success" onclick="addName()">➕ Add</button>
  </div>

  <div class="card">
    <h3>Queue</h3>
    <ul id="list"></ul>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  doc, 
  setDoc, 
  onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ✅ Your Firebase config (already correct)
const firebaseConfig = {
  apiKey: "AIzaSyAhEeegT4M7NIqfPriX4aXtVGWYRtRk80g",
  authDomain: "eoc-it-rotation-4c320.firebaseapp.com",
  projectId: "eoc-it-rotation-4c320",
  storageBucket: "eoc-it-rotation-4c320.firebasestorage.app",
  messagingSenderId: "1098588557484",
  appId: "1:1098588557484:web:d31d60eceb0dd1fd4e4f09"
};

// ✅ Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ Shared document (THIS MAKES IT GLOBAL)
const docRef = doc(db, "schedule", "main");

// Local state
let names = [];
let currentIndex = 0;

// ✅ Listen for live updates (REAL-TIME SYNC)
onSnapshot(docRef, (snap) => {
  if (snap.exists()) {
    const data = snap.data();
    names = data.names || [];
    currentIndex = data.currentIndex || 0;
  } else {
    names = [];
    currentIndex = 0;
  }
  render();
});

// ✅ Save to Firebase
async function saveData() {
  await setDoc(docRef, {
    names,
    currentIndex
  });
}

// ✅ UI Actions
window.addName = function() {
  const input = document.getElementById("nameInput");
  if (!input.value) return;

  names.push(input.value);
  input.value = "";
  saveData();
};

window.nextTurn = function() {
  if (names.length === 0) return;
  currentIndex = (currentIndex + 1) % names.length;
  saveData();
};

window.shuffle = function() {
  names.sort(() => Math.random() - 0.5);
  currentIndex = 0;
  saveData();
};

window.reset = function() {
  names = [];
  currentIndex = 0;
  saveData();
};

// ✅ Render UI
function render() {
  const list = document.getElementById("list");
  const currentBox = document.getElementById("currentTurn");

  list.innerHTML = "";

  names.forEach((name, index) => {
    const li = document.createElement("li");
    li.textContent = name;
    if (index === currentIndex) li.classList.add("current");
    list.appendChild(li);
  });

  currentBox.textContent = names.length
    ? "Current Turn: " + names[currentIndex]
    : "Current Turn: None";
}
</script>

</body>
</html>
