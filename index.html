<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rotating Task Schedule</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffe5d9, #ffd6e8, #eaf4ff);
  background-attachment: fixed;
  margin: 0;
  padding: 0;
  color: #2c3e50;
}

header {
  background: #bcd3ea;
  color: #2c3e50;
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: bold; /* ✅ this makes it bold */
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

.card {
  background: #ffffff;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: #2c3e50;
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 5px rgba(0,0,0,0.12);
}

.btn-primary { background: #a7c7e7; }
.btn-success { background: #ffd6a5; }  /* ✅ Add button now orange */
.btn-warning { background: #ffc0cb; }
.btn-danger { background: #b8f2e6; }

input {
  padding: 10px;
  width: 70%;
  margin-right: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  color: #2c3e50;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  padding: 10px;
  background: #f3f7fb;
  margin: 5px 0;
  border-radius: 6px;
}

.current {
  background: #b5ead7;
  font-weight: bold;
}

.current-box {
  font-size: 20px;
  font-weight: bold;
  padding: 15px;
  border-radius: 10px;
  background: #f0f8ff;
  text-align: center;
}
</style>

</head>

<body>

<header>
  🔄 EOC - IT Rotating Schedule
</header>

<div class="container">

  <div class="card current-box" id="currentTurn">
    Current Turn: None
  </div>

  <div class="card">
    <button class="btn-primary" onclick="nextTurn()">⏭️ Next Turn</button>
    <button class="btn-warning" onclick="shuffle()">🔀 Shuffle</button>
    <button class="btn-danger" onclick="reset()">♻️ Reset</button>
  </div>

  <div class="card">
    <input id="nameInput" placeholder="Add a person..." />
    <button class="btn-success" onclick="addName()">➕ Add</button>
  </div>

  <div class="card">
    <h3>Queue</h3>
    <ul id="list"></ul>
  </div>

</div>

<script>
let names = [];
let currentIndex = 0;

const API_URL = "https://YOUR-BACKEND-URL/api/schedule";

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    names = data.names || [];
    currentIndex = data.currentIndex || 0;
    render();
  } catch {
    render();
  }
}

async function saveData() {
  try {
    await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ names, currentIndex })
    });
  } catch {}
}

function addName() {
  const input = document.getElementById("nameInput");
  if (!input.value) return;
  names.push(input.value);
  input.value = "";
  saveData();
  render();
}

function nextTurn() {
  if (names.length === 0) return;
  currentIndex = (currentIndex + 1) % names.length;
  saveData();
  render();
}

function shuffle() {
  names.sort(() => Math.random() - 0.5);
  currentIndex = 0;
  saveData();
  render();
}

function reset() {
  names = [];
  currentIndex = 0;
  saveData();
  render();
}

function render() {
  const list = document.getElementById("list");
  const currentBox = document.getElementById("currentTurn");

  list.innerHTML = "";

  names.forEach((name, index) => {
    const li = document.createElement("li");
    li.textContent = name;
    if (index === currentIndex) li.classList.add("current");
    list.appendChild(li);
  });

  currentBox.textContent = names.length
    ? "Current Turn: " + names[currentIndex]
    : "Current Turn: None";
}

loadData();
</script>

</body>
</html>
